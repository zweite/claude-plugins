name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install plugin dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r plugins/mongodb/scripts/requirements.txt
          pip install requests

      - name: Compile all plugin Python files
        run: python -m compileall -q plugins/

      - name: mysql unit tests
        run: python plugins/mysql/scripts/test_mysql.py

      - name: mongodb unit tests
        run: python plugins/mongodb/scripts/test_mongodb.py

  json:
    name: validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse every .json file
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" 2>/dev/null; then
              echo "::error file=$f::invalid JSON"
              fail=1
            fi
          done < <(git ls-files '*.json' '*.jsonc')
          exit "$fail"

  lint:
    name: lint (ruff + actionlint + markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff
        run: ruff check .

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: "**/*.md"
