name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install plugin dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r plugins/mongodb/scripts/requirements.txt
          pip install requests

      - name: Compile all plugin Python files
        run: python -m compileall -q plugins/

      - name: mysql unit tests
        run: python plugins/mysql/scripts/test_mysql.py

      - name: mongodb unit tests
        run: python plugins/mongodb/scripts/test_mongodb.py

  json:
    name: validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse every .json / .jsonc file
        run: |
          python3 - <<'PY'
          import json, re, subprocess, sys
          files = subprocess.check_output(
              ['git', 'ls-files', '*.json', '*.jsonc']
          ).decode().split()
          fail = 0
          for f in files:
              txt = open(f).read()
              if f.endswith('.jsonc'):
                  # strip // line comments and /* */ block comments
                  txt = re.sub(r'/\*.*?\*/', '', txt, flags=re.S)
                  txt = re.sub(r'//[^\n]*', '', txt)
              try:
                  json.loads(txt)
              except Exception as e:
                  print(f'::error file={f}::invalid JSON: {e}')
                  fail = 1
          sys.exit(fail)
          PY

  lint:
    name: lint (ruff + actionlint + markdownlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: ruff
        run: ruff check .

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: |
            **/*.md
            !node_modules
            !**/node_modules
